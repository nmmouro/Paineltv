const STATUS = {

   viagem:{

/* ================= HELPERS ================= */

/* 🔹 converte resposta GViz em JSON */
const parseGviz = txt =>

  JSON.parse(
    txt.substring(
      txt.indexOf("{"),
      txt.lastIndexOf("}") + 1
    )
  );

/* 🔹 extrai valor da célula */
const getCell = c =>
  c?.f ?? c?.v ?? "";


  
function formatarData(valor){

  if(!valor) return "";

  if(valor instanceof Date){
    return valor.toLocaleDateString("pt-BR");
  }

  const texto = String(valor);

  const match =
    texto.match(/\d{1,2}\/\d{1,2}\/\d{4}/);

  if(match){
    return match[0];
  }

  return texto;
}
  
  

/* 🔹 identifica chave do status */
function getStatusKey(status=""){

  status = status
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");

  if(status.includes("manutencao"))
    return "manutenção";

  if(status.includes("viagem"))
    return "viagem";

  if(status.includes("andamento"))
    return "andamento";

  if(status.includes("atendido"))
    return "atendido";

  if(status.includes("concluido"))
    return "concluido";

  if(status.includes("cancelado"))
    return "cancelado";

  return null;
}
  
/* 🔹 retorna classe CSS */
function getStatusClass(status){

  const key =
    getStatusKey(status);

  return STATUS[key]?.class || "";
}

/* 🔹 retorna ícone */
function getStatusIcon(status){

  const key =
    getStatusKey(status);

  return STATUS[key]?.icon || "";
}


/* ================= FETCH ================= */

async function fetchSheet(sheet){

  try{

     let query = "";

    // Somente para a aba PAINEL
    if(sheet === "LANÇAMENTOS"){
      
  query =
  `select B,C,D,E,F,G,X `;
    }

if(sheet === "AGENDA DO DIA"){

  query =
    "select B,C,D,E,F,G,H";
}


    if(sheet === "AGENDA SERVIÇO SOCIAL"){

  query =
    "select B,C,D,F,G,H";
}

    if(sheet === "VEÍCULOS"){

  query =
    "select B,V,M,N";
}

     if(sheet === "MOTORISTAS"){

  query =
    "select A,B,C";
}
    

    const url =
  `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq` +
  `?sheet=${encodeURIComponent(sheet)}` +
  `&tq=${encodeURIComponent(query)}` +
  `&tqx=out:json`;

    const res = await fetch(url);

    if(!res.ok){
      throw new Error(
        `HTTP ${res.status}`
      );
    }

    return parseGviz(
      await res.text()
    );

  }catch(err){

    console.error(
      `Erro na aba ${sheet}:`,
      err
    );

    return {
      table:{
        rows:[]
      }
    };
  }
}
/* ================= TABLE ================= */

function renderTable(headers, rows){

  return `

    <table>

      <thead>

        <tr>

          ${headers.map(h => `
            <th>${h}</th>
          `).join("")}

        </tr>

      </thead>

      <tbody>

        ${rows.map(row => {

          const values =
            (row.c || []).map(getCell);

          
const status =
  values.at(-1)?.toLowerCase() || "";

const rowClass =
  getStatusClass(status);

const icon =
  getStatusIcon(status);

return `

  <tr class="${rowClass}">

    ${values.map((v,i)=>{

      const isLast =
        i === values.length - 1;

      return `
        <td class="${isLast ? 'status-icon' : ''}">

          ${isLast ? icon : v}

        </td>
      `;
    }).join("")}

  </tr>
`;

    }).join("")}
          
      </tbody>

    </table>
  `;
}

/* ================= GESTÃO DA TABLE ================= */

function getDisponibilidade(nome, painelRows, tipo){

  const procurado =
    String(nome || "").trim().toUpperCase();

  for(const row of painelRows){

    const valores =
      (row.c || []).map(getCell);

    const veiculo =
      String(valores[3] || "").trim().toUpperCase();

    const motorista =
      String(valores[2] || "").trim().toUpperCase();

    const status =
      String(valores[6] || "").trim().toUpperCase();

    const encontrado =
      tipo === "veiculo"
        ? veiculo === procurado
        : motorista === procurado;

    if(!encontrado){
      continue;
    }

    // MANUTENÇÃO
    if(
      status.includes("MANUTENÇÃO") ||
      status.includes("MANUTENCAO")
    ){

      if(tipo === "veiculo"){
        return '<span class="manutencao">🔵 MANUTENÇÃO</span>';
      }

      return '<span class="livre">🟢 LIVRE</span>';
    }

    // VIAGEM
    if(status.includes("VIAGEM")){
      return '<span class="viagem">🟣 VIAGEM</span>';
    }

    // OCUPADO
    return '<span class="ocupado">🔴 OCUPADO</span>';
  }

  return '<span class="livre">🟢 LIVRE</span>';
}  

/* ================= VEÍCULOS ================= */
  
function renderVeiculos(rows, painelRows){

}

app.innerHTML = "";

/* VEÍCULOS + MOTORISTAS */

const hojeStr = new Date().toLocaleDateString("pt-BR");
    
/*painelRows = painelRows.filter(r => {
  const v = (r.c || []).map(getCell);
  return String(v[0]).trim() === hojeStr;
});
*/

let painelRows =
  (results[painelIndex].table.rows || [])
    .filter(row => {
   
      const v =
        (row.c || []).map(getCell);

      const status =
        String(v[6] || "")
          .toUpperCase()
          .trim();

      return (
        status.includes("AGENDADO") ||
        status.includes("EM ANDAMENTO") ||
        status.includes("VIAGEM") ||
        status.includes("MANUTENÇÃO") ||
        status.includes("MANUTENCAO")
      );
    });


painelRows.sort((a, b) => {

  const va = (a.c || []).map(getCell);
  const vb = (b.c || []).map(getCell);

  const parse = (dataStr, horaStr) => {

    if (!dataStr) return new Date(0);

    const d = dataStr.includes("/")
      ? dataStr.split("/")
      : new Date(dataStr);

    const dia = Array.isArray(d) ? d[0] : d.getDate();
    const mes = Array.isArray(d) ? d[1] : d.getMonth() + 1;
    const ano = Array.isArray(d) ? d[2] : d.getFullYear();

    const h = (horaStr || "00:00").split(":");

    return new Date(
      Number(ano),
      Number(mes) - 1,
      Number(dia),
      Number(h[0] || 0),
      Number(h[1] || 0)
    );
  };

  return parse(va[0], va[1]) - parse(vb[0], vb[1]);
});

 

const agendaIndex =
  TABS.findIndex(t => t.id === "agenda");

const d = new Date();

const hoje =
  `${String(d.getDate()).padStart(2,"0")}/` +

  `${d.getFullYear()}`;

const agendaRows =
  (results[agendaIndex].table.rows || [])
    .filter(row => {

      const v = (row.c || []).map(getCell);

      return String(v[0] || "").trim() === hoje;
    });



/*
agendaRows.sort((a, b) => {

  return new Date(`${va[0]} ${va[1]}`) - new Date(`${vb[0]} ${vb[1]}`);

 section.innerHTML = `

`;

let rows;

/* ================= CLOCK ================= */

function updateClock(){

  const now = new Date();

  document.getElementById(
    "clock"
  ).innerText =

    now.toLocaleDateString("pt-BR") +

    " — " +

    now.toLocaleTimeString(
      "pt-BR",
      {
        hour:"2-digit",
        minute:"2-digit"
      }
    );
}

setInterval(updateClock,1000);

updateClock();

/* ================= AUDIO ================= */

const audio =
  document.getElementById("beep");

const audioBtn =
  document.getElementById("toggle-audio");

let soundEnabled = true;

function updateAudioButton(){

  if(soundEnabled){

    audioBtn.innerText = "🔊 SOM ON";

    audioBtn.classList.remove("off");

  }else{

    audioBtn.innerText = "🔇 SOM OFF";

    audioBtn.classList.add("off");
  }
}

audioBtn.onclick = () => {

  soundEnabled = !soundEnabled;

  updateAudioButton();
};

function playBeep(){

  if(!soundEnabled)
    return;

  audio.currentTime = 0;

  audio.play().catch(()=>{});

  updateAudioButton();
}

/* ================= FULLSCREEN ================= */

document.getElementById(
  "toggle-fullscreen"
).onclick = async () => {

  if(!document.fullscreenElement){

    await document.documentElement
      .requestFullscreen();

  }else{

    await document.exitFullscreen();
  }
};
